services:
  db:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8080:8080"
    volumes:
      - surreal_data:/data
    environment:
      SURREAL_LOG: info
    command: start --bind 0.0.0.0:8080 --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-root} surrealkv://data/srdb.db
    healthcheck:
      test:
        [
          "CMD",
          "/surreal",
          "is-ready",
          "--endpoint",
          "http://localhost:8080",
          "--log",
          "none",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  webapp:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:3000"

    volumes:
      - ./webapp:/app
      - webapp_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: http://db:8080/rpc
      SURREAL_USER: ${APP_USER:-root}
      SURREAL_PASS: ${APP_PASS:-root}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_HOSTNAME: localhost:9000
      S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET_NAME: ${BUCKET_NAME:-local-bucket}
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${BUCKET_NAME:-local-bucket} &&
      mc anonymous set public local/${BUCKET_NAME:-local-bucket}
      "

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOZZLE_NO_ANALYTICS: true

volumes:
  surreal_data:
  webapp_node_modules:
  minio_data:
